name: Publish Legend Browser to GitHub Pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "pages/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Auto-deploy only from main; manual dispatch is allowed from any branch (for testing)
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          set -euo pipefail
          cp -rv pages/. site/
          # Download legend CSV at build time to avoid CORS issues when served from Pages
          curl -fsSL \
            "https://artifactory.vgt.vito.be/artifactory/auxdata-public/worldcereal/legend/WorldCereal_LC_CT_legend_latest.csv" \
            -o site/legend/legend.csv

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
